name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token: CI only reads the repo.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Must match the pin in scripts/fetch-pdfium.sh; keyed into the cache below.
  PDFIUM_VERSION: chromium/7934

jobs:
  test:
    name: test · clippy · fmt · determinism
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Rust toolchain
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt

      - name: Cargo cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: PDFium cache
        id: pdfium-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .pdfium
          key: pdfium-${{ runner.os }}-${{ env.PDFIUM_VERSION }}

      - name: Fetch PDFium
        if: steps.pdfium-cache.outputs.cache-hit != 'true'
        run: ./scripts/fetch-pdfium.sh

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build worker CLI
        run: cargo build -p docray-cli

      - name: Tests
        run: cargo test --workspace

      - name: Fixture determinism
        run: |
          cargo run -p docray-pdf --example gen_fixtures
          git diff --exit-code testdata/ \
            || { echo "::error::fixture regeneration changed committed testdata"; exit 1; }

  wasm:
    name: wasm build + parity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown
          cargo install wasm-pack --locked
          cargo install wasm-bindgen-cli --version 0.2.126 --locked
          # Pinned binaryen: apt's older wasm-opt emits modules whose function
          # table cannot grow, which breaks pdfium-render's callback install
          # (WebAssembly.Table.grow RangeError). v130 is verified.
          curl -fsSL https://github.com/WebAssembly/binaryen/releases/download/version_130/binaryen-version_130-x86_64-linux.tar.gz \
            | sudo tar -xz -C /opt && sudo ln -sf /opt/binaryen-version_130/bin/wasm-opt /usr/local/bin/wasm-opt
          wasm-opt --version
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: PDFium cache (native, for the reference CLI)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .pdfium
          key: pdfium-${{ runner.os }}-${{ env.PDFIUM_VERSION }}
      - name: Fetch native PDFium
        run: test -d .pdfium/lib || ./scripts/fetch-pdfium.sh
      - name: Build reference CLI + wasm (nodejs target)
        run: |
          cargo build --release -p docray-cli
          ./scripts/build-wasm.sh --target nodejs
      - name: Parity matrix (WASM vs native)
        run: node scripts/wasm-parity.cjs web/wasm-nodejs target/release/docray

  docker:
    name: docker build + smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build image
        run: docker build -t docray:ci .

      - name: Smoke test
        run: |
          # Explicit port: decouples the smoke test from the image's default.
          docker run -d --rm -e DOCRAY_PORT=41619 -p 41619:41619 --name docray-smoke docray:ci
          for i in $(seq 1 30); do
            curl -sf http://localhost:41619/healthz && break
            sleep 1
          done
          curl -sf http://localhost:41619/healthz
          curl -sf -F file=@testdata/simple.pdf http://localhost:41619/v1/extract \
            | grep -q '"schema_version":"1.1"'
          docker stop docray-smoke
