name: Docs

on:
  push:
    branches: [main]
    paths: ["book/**", "web/**", "crates/docray-wasm/**", "scripts/build-wasm.sh", "scripts/build-try.sh", ".github/workflows/docs.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          mkdir -p ~/.local/bin
          curl -fsSL https://github.com/rust-lang/mdBook/releases/download/v0.5.4/mdbook-v0.5.4-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C ~/.local/bin
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build book
        run: mdbook build book
      - name: Rust toolchain (wasm)
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown
          cargo install wasm-pack --locked
          cargo install wasm-bindgen-cli --version 0.2.126 --locked
          # Pinned binaryen: apt's older wasm-opt emits modules whose function
          # table cannot grow, which breaks pdfium-render's callback install
          # (WebAssembly.Table.grow RangeError). v130 is verified.
          curl -fsSL https://github.com/WebAssembly/binaryen/releases/download/version_130/binaryen-version_130-x86_64-linux.tar.gz \
            | sudo tar -xz -C /opt && sudo ln -sf /opt/binaryen-version_130/bin/wasm-opt /usr/local/bin/wasm-opt
          wasm-opt --version
      - uses: Swatinem/rust-cache@v2
      - name: Build in-browser playground
        run: |
          ./scripts/build-wasm.sh
          ./scripts/build-try.sh
          cp -r web/try book/book/try
      - name: PDFium cache (native, for the parity reference)
        uses: actions/cache@v4
        with:
          path: .pdfium
          key: pdfium-${{ runner.os }}-docs-parity
      - name: Runtime-gate the optimized module (never deploy broken wasm)
        run: |
          test -d .pdfium/lib || ./scripts/fetch-pdfium.sh
          cargo build --release -p docray-cli
          ./scripts/build-wasm.sh --target nodejs
          node scripts/wasm-parity.cjs web/wasm-nodejs target/release/docray
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: book/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
