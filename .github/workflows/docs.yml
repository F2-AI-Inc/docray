name: Docs

on:
  push:
    branches: [main]
    paths: ["book/**", "web/**", "crates/docray-wasm/**", "scripts/build-wasm.sh", "scripts/build-try.sh", ".github/workflows/docs.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          mkdir -p ~/.local/bin
          curl -fsSL https://github.com/rust-lang/mdBook/releases/download/v0.5.4/mdbook-v0.5.4-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C ~/.local/bin
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build book
        run: mdbook build book
      - name: Rust toolchain (wasm)
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown
          cargo install wasm-pack --locked
          cargo install wasm-bindgen-cli --version 0.2.126 --locked
      - uses: Swatinem/rust-cache@v2
      - name: Build in-browser playground
        run: |
          ./scripts/build-wasm.sh
          ./scripts/build-try.sh
          cp -r web/try book/book/try
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: book/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
