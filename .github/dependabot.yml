# Keeps SHA-pinned actions from rotting: Dependabot bumps the pinned commit
# (and version comment) when actions release updates. Majors are excluded —
# they carry cross-action pairing constraints (upload/download-artifact,
# upload-pages-artifact/deploy-pages) that PR-level CI cannot exercise, so
# major upgrades are done deliberately, as a reviewed change.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
